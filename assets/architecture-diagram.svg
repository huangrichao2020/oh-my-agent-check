<svg width="1400" height="1120" viewBox="0 0 1400 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="30" x2="1340" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6F9"/>
      <stop offset="1" stop-color="#FFFDF7"/>
    </linearGradient>
    <style>
      .title { font: 700 36px 'Inter', 'Segoe UI', sans-serif; fill: #3C2030; }
      .subtitle { font: 500 18px 'Inter', 'Segoe UI', sans-serif; fill: #7A5566; }
      .section { font: 700 22px 'Inter', 'Segoe UI', sans-serif; fill: #4D2A37; }
      .copy { font: 500 16px 'Inter', 'Segoe UI', sans-serif; fill: #735362; }
      .mono { font: 600 15px 'SFMono-Regular', 'Menlo', monospace; fill: #5A3342; }
      .chip { font: 700 14px 'Inter', 'Segoe UI', sans-serif; fill: #8A4C5F; letter-spacing: 0.06em; text-transform: uppercase; }
    </style>
  </defs>

  <rect x="24" y="24" width="1352" height="1072" rx="34" fill="url(#bg)"/>
  <text x="86" y="94" class="title">oh-my-agent-check audit architecture</text>
  <text x="86" y="126" class="subtitle">From messy symptoms to evidence-backed failure maps and code-first fixes.</text>

  <rect x="86" y="178" width="1228" height="252" rx="28" fill="#FFFDFE" stroke="#F4CAD6" stroke-width="2"/>
  <rect x="118" y="210" width="140" height="34" rx="17" fill="#FFE7EF"/>
  <text x="146" y="233" class="chip">Input chaos</text>
  <text x="118" y="286" class="section">Symptoms and suspicion</text>
  <text x="118" y="330" class="copy">• user complaints</text>
  <text x="118" y="362" class="copy">• code, logs, database rows, payloads, screenshots</text>
  <text x="118" y="394" class="copy">• current state plus historical incident windows</text>

  <rect x="86" y="462" width="1228" height="252" rx="28" fill="#FFFFFF" stroke="#F2D5AE" stroke-width="2"/>
  <rect x="118" y="494" width="178" height="34" rx="17" fill="#FFF4D5"/>
  <text x="146" y="517" class="chip">JSON-first core</text>
  <text x="118" y="570" class="section">Four internal artifacts</text>
  <text x="118" y="614" class="mono">agent_check_scope.json</text>
  <text x="118" y="646" class="mono">evidence_pack.json</text>
  <text x="118" y="678" class="mono">failure_map.json</text>
  <text x="118" y="710" class="mono">agent_check_report.json</text>

  <rect x="86" y="746" width="1228" height="252" rx="28" fill="#FFFDFE" stroke="#F4CAD6" stroke-width="2"/>
  <rect x="118" y="778" width="170" height="34" rx="17" fill="#FFE7EF"/>
  <text x="147" y="801" class="chip">No-mercy output</text>
  <text x="118" y="854" class="section">What the user receives</text>
  <text x="118" y="898" class="copy">• severity-ranked findings first</text>
  <text x="118" y="930" class="copy">• contamination path across layers</text>
  <text x="118" y="962" class="copy">• ordered fix plan with code-first hardening</text>

  <rect x="86" y="1026" width="1228" height="42" rx="18" fill="#FFF7E7" stroke="#F2D5AE"/>
  <text x="118" y="1053" class="copy">Principle: do not let current cleanliness erase historical damage. Prove the failure path, then force the fix order through code.</text>
</svg>
