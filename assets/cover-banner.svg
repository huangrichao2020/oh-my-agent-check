<svg width="1600" height="1040" viewBox="0 0 1600 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1540" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF4F8"/>
      <stop offset="0.55" stop-color="#FFFCEE"/>
      <stop offset="1" stop-color="#FDF7FF"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1680" height="1120" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#B7758D" flood-opacity="0.15"/>
    </filter>
    <style>
      .hero { font: 800 58px 'Inter', 'Segoe UI', sans-serif; fill: #341A28; }
      .sub { font: 500 24px 'Inter', 'Segoe UI', sans-serif; fill: #745262; }
      .chip { font: 700 15px 'Inter', 'Segoe UI', sans-serif; fill: #8F5062; letter-spacing: 0.08em; text-transform: uppercase; }
      .panelTitle { font: 700 24px 'Inter', 'Segoe UI', sans-serif; fill: #4F2A38; }
      .copy { font: 500 18px 'Inter', 'Segoe UI', sans-serif; fill: #6E4F5D; }
      .mono { font: 700 15px 'SFMono-Regular', 'Menlo', monospace; fill: #5B3544; }
    </style>
  </defs>

  <rect x="24" y="24" width="1552" height="992" rx="38" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="76" y="76" width="1448" height="888" rx="36" fill="#FFFEFF" stroke="#F3D7E0" stroke-width="2"/>
  </g>

  <rect x="126" y="128" width="196" height="40" rx="20" fill="#FFE8F0"/>
  <text x="160" y="154" class="chip">No-mercy audit skill</text>

  <text x="126" y="246" class="hero">oh-my-agent-check</text>
  <text x="126" y="294" class="sub">A brutal, evidence-backed way to find where your agent wrapper</text>
  <text x="126" y="330" class="sub">started lying.</text>

  <rect x="126" y="392" width="1348" height="248" rx="30" fill="#FFF7FA" stroke="#F4D2DC"/>
  <text x="166" y="446" class="panelTitle">What it hunts</text>
  <text x="166" y="490" class="copy">• duplicated context across prompt, history, memory, and recall</text>
  <text x="166" y="530" class="copy">• stale evidence replay dressed up as current truth</text>
  <text x="166" y="570" class="copy">• tools suggested in prompt but never enforced in code</text>
  <text x="166" y="610" class="copy">• hidden repair brains that mutate good answers in transport</text>

  <rect x="126" y="680" width="1348" height="224" rx="30" fill="#FFFDF7" stroke="#F3E3B5"/>
  <rect x="166" y="718" width="154" height="36" rx="18" fill="#FF7B9D"/>
  <text x="198" y="742" class="chip" style="fill:#FFFFFF">How it feels</text>
  <text x="166" y="794" class="panelTitle">1. Starts from suspicion, not politeness</text>
  <text x="166" y="826" class="copy">Treat the wrapper as untrusted until evidence proves otherwise.</text>
  <text x="166" y="866" class="panelTitle">2. Turns vibes into audit artifacts</text>
  <text x="166" y="898" class="copy">Every strong claim must map back to logs, code, rows, or payloads.</text>

  <rect x="126" y="930" width="1348" height="54" rx="22" fill="#FFF3D9" stroke="#F0D59A"/>
  <text x="166" y="964" class="mono">scope.json -> evidence_pack.json -> failure_map.json -> report.json</text>
</svg>
