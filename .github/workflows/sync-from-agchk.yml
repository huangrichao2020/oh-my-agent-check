name: Auto-generate Skill package

on:
  schedule:
    - cron: "0 0 * * 1"  # Weekly on Monday
  workflow_dispatch:      # Manual trigger
  push:
    branches: [main]

jobs:
  sync-from-agchk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone agchk
        run: git clone --depth=1 https://github.com/huangrichao2020/agchk.git /tmp/agchk

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Skill files from agchk
        run: |
          python /tmp/agchk/scripts/gen-skill.py
        env:
          AGCHK_ROOT: /tmp/agchk

      - name: Copy generated files to repo
        run: |
          # Copy generated SKILL.md and references
          cp /tmp/agchk/output/oh-my-agent-check/SKILL.md ./SKILL.md
          cp /tmp/agchk/output/oh-my-agent-check/README.md ./README.md
          mkdir -p references
          cp /tmp/agchk/output/oh-my-agent-check/references/* ./references/

          # Copy assets from agchk if they exist
          if [ -d /tmp/agchk/assets ]; then
            cp -r /tmp/agchk/assets/* ./assets/ 2>/dev/null || true
          fi

          # Copy LICENSE
          cp /tmp/agchk/LICENSE ./LICENSE

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync from agchk ($(date -u +%Y-%m-%d))

          Generated by CI from https://github.com/huangrichao2020/agchk"
            git push
          fi
